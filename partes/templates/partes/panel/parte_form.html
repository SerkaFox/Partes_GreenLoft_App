{% extends 'partes/panel/base.html' %}
{% block content %}
<h1 class="h3 mb-4">Editar parte #{{ parte.id }}</h1>
<div class="card"><div class="card-body">
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn btn-primary">Guardar y regenerar PDF/CSV</button>
  <a class="btn btn-outline-secondary" href="{% url 'panel_partes' %}">Cancelar</a>
</form>
</div></div>
{% endblock %}
