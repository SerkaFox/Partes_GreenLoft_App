{% extends 'partes/panel/base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h4 mb-3">Acceso al panel</h1>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3"><label class="form-label">Usuario</label>{{ form.username }}</div>
          <div class="mb-3"><label class="form-label">Contraseña</label>{{ form.password }}</div>
          <button class="btn btn-primary w-100">Entrar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
