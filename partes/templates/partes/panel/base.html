<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title|default:'Panel' }} - j.listoya.es</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f3f5f8; }
    .navbar { background: #1d5fa7; }
    .card { border-radius: 8px; }
    .table td, .table th { vertical-align: middle; }
    textarea { min-height: 110px; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'panel_dashboard' %}">Gestión de Partes</a>
    {% if request.user.is_authenticated %}
    <div class="navbar-nav me-auto">
      <a class="nav-link" href="{% url 'panel_dashboard' %}">Dashboard</a>
      <a class="nav-link" href="{% url 'panel_tecnicos' %}">Técnicos</a>
      <a class="nav-link" href="{% url 'panel_vehiculos' %}">Vehículos</a>
      <a class="nav-link" href="{% url 'panel_proyectos' %}">Obras</a>
      <a class="nav-link" href="{% url 'panel_partes' %}">Partes</a>
      <a class="nav-link" href="{% url 'workdocs_dashboard' %}">Trabajo</a>
    </div>
    <a class="btn btn-sm btn-outline-light" href="{% url 'panel_logout' %}">Salir</a>
    {% endif %}
  </div>
</nav>
<main class="container-fluid px-4 pb-5">
  {% for message in messages %}<div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>{% endfor %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
