<style>
  .login-shell { min-height: calc(100vh - 120px); display: grid; place-items: center; }
  .work-login-card { width: min(460px, 100%); border-radius: 8px; }
  .access-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .access-tab { border: 1px solid var(--wl-border); background: rgba(5, 16, 13, .7); color: var(--wl-muted); border-radius: 8px; padding: 10px 12px; font-weight: 700; box-shadow: inset 0 1px 0 rgba(255,255,255,.08); }
  .access-tab.active { background: linear-gradient(180deg, rgba(73,201,133,.34), rgba(21,148,91,.4)); border-color: rgba(140,255,190,.5); color: var(--wl-text); }
  .user-results { position: absolute; z-index: 20; width: 100%; max-height: 260px; overflow: auto; border: 1px solid var(--wl-border); border-radius: 8px; background: rgba(6,18,15,.96); box-shadow: var(--wl-shadow); }
  .user-result { width: 100%; border: 0; background: transparent; color: var(--wl-text); text-align: left; padding: 10px 12px; }
  .user-result:hover { background: rgba(73,201,133,.16); }
  .selected-user { display: flex; justify-content: space-between; align-items: center; gap: 10px; border: 1px solid var(--wl-border); border-radius: 8px; padding: 10px 12px; background: rgba(6,18,15,.82); }
  .hint-text { color: var(--wl-muted); font-size: .9rem; }
</style>
<div class="card work-login-card">
  <div class="card-body p-4">
    <div class="mb-4">
      <div class="text-uppercase hint-text fw-semibold">GreenLoft</div>
      <h2 class="h3 mb-1">Panel de trabajo</h2>
      <div class="hint-text">Accede para gestionar tareas, documentos e informes.</div>
    </div>

    <div class="access-tabs mb-3" role="tablist">
      <button class="access-tab active" type="button" data-login-role="admin_manager">Administración</button>
      <button class="access-tab" type="button" data-login-role="technician">Técnicos</button>
    </div>

    <form method="post" action="{% url 'panel_login' %}" id="smart-login-form" autocomplete="off">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next|default:'/trabajo/' }}">
      <input type="hidden" name="username" id="id_username">
      <div class="mb-3 position-relative" id="user-search-wrap">
        <label class="form-label" for="search_user">Buscar usuario</label>
        <input class="form-control form-control-lg" id="search_user" name="search_user" type="text" placeholder="Escribe tu nombre..." autocomplete="off">
        <div class="user-results d-none" id="user-results"></div>
        <div class="selected-user d-none mt-2" id="selected-user">
          <span id="selected-user-name"></span>
          <button class="btn btn-sm btn-outline-secondary" type="button" id="change-user">Cambiar usuario</button>
        </div>
      </div>
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="remember-user" checked>
        <label class="form-check-label" for="remember-user">Recordar este usuario</label>
      </div>
      <div class="mb-3">
        <label class="form-label" for="id_password">Contraseña</label>
        <input class="form-control form-control-lg" id="id_password" name="password" type="password" placeholder="Introduce tu contraseña" autocomplete="current-password" required>
      </div>
      <div class="alert alert-danger d-none" id="login-client-error"></div>
      <button class="btn btn-primary btn-lg w-100" type="submit">Entrar</button>
    </form>
  </div>
</div>

<script>
(() => {
  const form = document.getElementById('smart-login-form');
  if (!form) return;
  const tabs = [...document.querySelectorAll('[data-login-role]')];
  const search = document.getElementById('search_user');
  const username = document.getElementById('id_username');
  const results = document.getElementById('user-results');
  const selected = document.getElementById('selected-user');
  const selectedName = document.getElementById('selected-user-name');
  const changeUser = document.getElementById('change-user');
  const remember = document.getElementById('remember-user');
  const password = document.getElementById('id_password');
  const error = document.getElementById('login-client-error');
  let role = localStorage.getItem('lastLoginRole') || 'admin_manager';
  let timer = null;

  function showError(message) {
    error.textContent = message;
    error.classList.remove('d-none');
  }

  function clearError() {
    error.textContent = '';
    error.classList.add('d-none');
  }

  function setRole(nextRole) {
    role = nextRole;
    tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.loginRole === role));
    clearUser(false);
  }

  function setUser(nextUsername, displayName, save) {
    username.value = nextUsername;
    search.value = displayName;
    selectedName.textContent = displayName;
    selected.classList.remove('d-none');
    results.classList.add('d-none');
    if (save && remember.checked) {
      localStorage.setItem('lastLoginRole', role);
      localStorage.setItem('lastLoginUsername', nextUsername);
      localStorage.setItem('lastLoginDisplayName', displayName);
    }
  }

  function clearUser(clearStorage = true) {
    username.value = '';
    search.value = '';
    selectedName.textContent = '';
    selected.classList.add('d-none');
    results.classList.add('d-none');
    if (clearStorage) {
      localStorage.removeItem('lastLoginUsername');
      localStorage.removeItem('lastLoginDisplayName');
    }
  }

  async function searchUsers(query) {
    if (query.length < 2) {
      results.classList.add('d-none');
      return;
    }
    const params = new URLSearchParams({ q: query, role });
    const response = await fetch(`/trabajo/api/users/search/?${params.toString()}`, { headers: { 'Accept': 'application/json' } });
    const users = await response.json();
    results.innerHTML = '';
    if (!users.length) {
      results.innerHTML = '<div class="p-3 hint-text">Sin resultados</div>';
    } else {
      users.forEach(user => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'user-result';
        button.innerHTML = `<strong>${user.full_name}</strong><div class="hint-text">${user.username} · ${user.role}</div>`;
        button.addEventListener('click', () => setUser(user.username, user.full_name, true));
        results.appendChild(button);
      });
    }
    results.classList.remove('d-none');
  }

  tabs.forEach(tab => tab.addEventListener('click', () => setRole(tab.dataset.loginRole)));
  search.addEventListener('input', () => {
    clearError();
    username.value = '';
    selected.classList.add('d-none');
    clearTimeout(timer);
    timer = setTimeout(() => searchUsers(search.value.trim()), 220);
  });
  changeUser.addEventListener('click', () => {
    clearUser();
    search.focus();
  });
  form.addEventListener('submit', event => {
    clearError();
    if (!username.value) {
      event.preventDefault();
      showError('Selecciona un usuario para continuar.');
      return;
    }
    if (!password.value) {
      event.preventDefault();
      showError('Introduce la contraseña.');
      return;
    }
    if (remember.checked) {
      localStorage.setItem('lastLoginRole', role);
      localStorage.setItem('lastLoginUsername', username.value);
      localStorage.setItem('lastLoginDisplayName', selectedName.textContent || search.value);
    }
  });

  setRole(role);
  const lastUsername = localStorage.getItem('lastLoginUsername');
  const lastDisplayName = localStorage.getItem('lastLoginDisplayName');
  if (lastUsername && lastDisplayName) {
    setUser(lastUsername, lastDisplayName, false);
  }
})();
</script>
