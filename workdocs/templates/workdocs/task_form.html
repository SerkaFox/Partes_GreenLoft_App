{% extends 'workdocs/base.html' %}
{% block content %}
<h1 class="h3 mb-3">Crear tarea</h1>
<form method="post" enctype="multipart/form-data" class="card border-0 shadow-sm">
  {% csrf_token %}
  <div class="card-body">
    <div class="row g-3">
      {% for field in form %}
      <div class="col-md-{% if field.name == 'description' or field.name == 'address' %}12{% else %}6{% endif %}">
        <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
      </div>
      {% endfor %}
      <div class="col-12">
        <label class="form-label" for="{{ file_form.files.id_for_label }}">Archivos</label>
        {{ file_form.files }}
      </div>
      <div class="col-12">
        <label class="form-label" for="{{ file_form.comment.id_for_label }}">Comentario de archivos</label>
        {{ file_form.comment }}
      </div>
    </div>
  </div>
  <div class="card-footer bg-white d-flex gap-2">
    <button class="btn btn-primary">Guardar</button>
    <a class="btn btn-outline-secondary" href="{% url 'workdocs_task_list' %}">Cancelar</a>
  </div>
</form>
{% endblock %}
