<script>
function initFilePreviews(root = document) {
  root.querySelectorAll('.multi-file-input').forEach(input => {
    if (input.dataset.previewReady) return;
    input.dataset.previewReady = '1';
    const preview = document.querySelector(input.dataset.previewTarget);
    let files = [];
    const sync = () => {
      const data = new DataTransfer();
      files.forEach(file => data.items.add(file));
      input.files = data.files;
      render();
    };
    const icon = file => {
      if (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) return 'PDF';
      if (file.type.startsWith('audio/')) return 'Audio';
      if (file.type.startsWith('video/')) return 'Vídeo';
      return 'Documento';
    };
    const render = () => {
      if (!preview) return;
      preview.innerHTML = '';
      files.forEach((file, index) => {
        const card = document.createElement('div');
        card.className = 'file-preview-card';
        let media = `<div class="p-3 text-center bg-light rounded">${icon(file)}</div>`;
        if (file.type.startsWith('image/')) media = `<img src="${URL.createObjectURL(file)}" alt="">`;
        if (file.type.startsWith('video/')) media = `<video src="${URL.createObjectURL(file)}" controls></video>`;
        if (file.type.startsWith('audio/')) media = `<audio class="w-100" src="${URL.createObjectURL(file)}" controls></audio>`;
        card.innerHTML = `${media}<div class="small fw-semibold mt-2 text-break">${file.name}</div><button class="btn btn-sm btn-outline-danger mt-2" type="button">Eliminar</button>`;
        card.querySelector('button').addEventListener('click', () => {
          files.splice(index, 1);
          sync();
        });
        preview.appendChild(card);
      });
    };
    input.addEventListener('change', () => {
      files = [...input.files];
      render();
    });
  });
}

function initTaskEditors() {
  document.querySelectorAll('.task-editor').forEach(editor => {
    if (editor.dataset.editorReady) return;
    editor.dataset.editorReady = '1';
    const latInput = editor.querySelector('[name="latitude"]');
    const lngInput = editor.querySelector('[name="longitude"]');
    const addressInput = editor.querySelector('[name="address"]');
    const assignedInput = editor.querySelector('[name="assigned_to"]');
    const techniciansSelect = editor.querySelector('.technicians-select');
    const selectedTechnicians = editor.querySelector('.selected-technicians');
    const techSearch = editor.querySelector('.technician-search');
    const techResults = editor.querySelector('.technician-results');
    const mapEl = editor.querySelector('.map-box');
    const statusSelectId = editor.querySelector('.status-button-group')?.dataset.statusSelect;
    const statusSelect = statusSelectId ? document.getElementById(statusSelectId) : null;
    editor.querySelectorAll('[data-status-value]').forEach(button => {
      button.addEventListener('click', () => {
        if (!statusSelect) return;
        statusSelect.value = button.dataset.statusValue;
        editor.querySelectorAll('[data-status-value]').forEach(item => {
          const isFinal = item.dataset.statusValue === 'FINALIZADA';
          item.classList.toggle('btn-primary', item === button && !isFinal);
          item.classList.toggle('btn-success', item === button && isFinal);
          item.classList.toggle('btn-outline-primary', item !== button && !isFinal);
          item.classList.toggle('btn-outline-success', item !== button && isFinal);
        });
        statusSelect.dispatchEvent(new Event('change', { bubbles: true }));
      });
    });
    const start = [
      parseFloat(latInput.value || editor.dataset.lat || '43.2630'),
      parseFloat(lngInput.value || editor.dataset.lng || '-2.9350')
    ];
    const map = L.map(mapEl).setView(start, latInput.value && lngInput.value ? 15 : 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);
    const marker = L.marker(start, { draggable: true }).addTo(map);
    const setPoint = latlng => {
      latInput.value = Number(latlng.lat).toFixed(7);
      lngInput.value = Number(latlng.lng).toFixed(7);
      latInput.dispatchEvent(new Event('change', { bubbles: true }));
      lngInput.dispatchEvent(new Event('change', { bubbles: true }));
      marker.setLatLng(latlng);
      map.setView(latlng, 16);
    };
    marker.on('dragend', () => setPoint(marker.getLatLng()));
    map.on('click', event => setPoint(event.latlng));
    const searchAddress = async () => {
      const query = addressInput.value.trim();
      if (!query) return;
      const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`;
      const response = await fetch(url, { headers: { 'Accept': 'application/json' } });
      const data = await response.json();
      if (data.length) {
        setPoint({ lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) });
      }
    };
    editor.querySelector('.map-search-button').addEventListener('click', searchAddress);
    addressInput.addEventListener('keydown', event => {
      if (event.key !== 'Enter') return;
      event.preventDefault();
      searchAddress();
    });
    setTimeout(() => map.invalidateSize(), 250);

    const selectedTechs = new Map(
      [...techniciansSelect.selectedOptions].map(option => [option.value, option.textContent])
    );
    let visibleTechButtons = [];
    const syncTechnicians = () => {
      [...techniciansSelect.options].forEach(option => {
        option.selected = selectedTechs.has(option.value);
      });
      assignedInput.value = selectedTechs.size ? [...selectedTechs.keys()][0] : '';
      assignedInput.dispatchEvent(new Event('change', { bubbles: true }));
      techniciansSelect.dispatchEvent(new Event('change', { bubbles: true }));
      selectedTechnicians.innerHTML = '';
      selectedTechs.forEach((name, id) => {
        const badge = document.createElement('span');
        badge.className = 'technician-chip';
        badge.innerHTML = `<span>${name}</span><button type="button" aria-label="Quitar técnico">&times;</button>`;
        badge.querySelector('button').addEventListener('click', () => {
          selectedTechs.delete(id);
          syncTechnicians();
        });
        selectedTechnicians.appendChild(badge);
      });
    };
    syncTechnicians();

    let techTimer = null;
    techSearch.addEventListener('input', () => {
      clearTimeout(techTimer);
      techTimer = setTimeout(async () => {
        const q = techSearch.value.trim();
        if (q.length < 2) {
          techResults.classList.add('d-none');
          return;
        }
        const response = await fetch(`/trabajo/api/users/search/?q=${encodeURIComponent(q)}&role=technician`);
        const users = await response.json();
        const availableUsers = users.filter(user => !selectedTechs.has(String(user.id)));
        visibleTechButtons = [];
        techResults.innerHTML = availableUsers.length ? '' : '<div class="p-3 text-muted">Sin resultados</div>';
        availableUsers.forEach(user => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'user-result';
          button.innerHTML = `<strong>${user.full_name}</strong><div class="small text-muted">${user.username}</div>`;
          button.addEventListener('click', () => {
            let option = techniciansSelect.querySelector(`option[value="${user.id}"]`);
            if (!option) {
              option = new Option(user.full_name, user.id);
              techniciansSelect.add(option);
            }
            selectedTechs.set(String(user.id), user.full_name);
            techSearch.value = '';
            syncTechnicians();
            techResults.classList.add('d-none');
          });
          techResults.appendChild(button);
          visibleTechButtons.push(button);
        });
        techResults.classList.remove('d-none');
      }, 220);
    });
    techSearch.addEventListener('keydown', event => {
      if (event.key !== 'Enter') return;
      event.preventDefault();
      if (visibleTechButtons.length) visibleTechButtons[0].click();
    });

    const recordBtn = editor.querySelector('.record-description');
    const stopBtn = editor.querySelector('.stop-description');
    const useBtn = editor.querySelector('.use-description-audio');
    const audioInput = editor.querySelector('.description-audio-input');
    const player = editor.querySelector('.description-audio-player');
    const status = editor.querySelector('.description-audio-status');
    let recorder;
    let chunks = [];
    let recordedFile = null;
    recordBtn.addEventListener('click', async () => {
      if (!navigator.mediaDevices) return;
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      recorder = new MediaRecorder(stream);
      chunks = [];
      recorder.ondataavailable = event => chunks.push(event.data);
      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: recorder.mimeType || 'audio/webm' });
        recordedFile = new File([blob], `descripcion-${Date.now()}.webm`, { type: blob.type });
        player.src = URL.createObjectURL(recordedFile);
        player.classList.remove('d-none');
        useBtn.classList.remove('d-none');
        status.textContent = 'Audio grabado. Pulsa Usar audio antes de guardar.';
        stream.getTracks().forEach(track => track.stop());
      };
      recorder.start();
      recordBtn.classList.add('d-none');
      stopBtn.classList.remove('d-none');
      status.textContent = 'Grabando...';
    });
    stopBtn.addEventListener('click', () => {
      if (recorder && recorder.state === 'recording') recorder.stop();
      stopBtn.classList.add('d-none');
      recordBtn.classList.remove('d-none');
    });
    useBtn.addEventListener('click', () => {
      if (!recordedFile) return;
      const data = new DataTransfer();
      data.items.add(recordedFile);
      audioInput.files = data.files;
      audioInput.dispatchEvent(new Event('change', { bubbles: true }));
      status.textContent = 'Audio listo para guardar.';
    });
  });
}

document.addEventListener('DOMContentLoaded', () => {
  initFilePreviews();
  initTaskEditors();
});
</script>
